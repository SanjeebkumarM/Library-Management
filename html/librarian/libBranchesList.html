<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Branches List</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  
  <link rel="stylesheet" href="../../css/index.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>
  <nav class="navBar">
    <div class="logo">
      <a href="../homepage.html">
        <img src="../../assets/logo.png" alt="ses">
      </a>
    </div>
    <div class="dropdown">
      <a href="#" role="button" class="rounded-circle" data-bs-toggle="dropdown" aria-expanded="false" data-bs-auto-close="outside">
        <i class="bi bi-person-circle" style="font-size: 2.2rem; color: rgb(255, 255, 255);"></i>
      </a>
      <div class="dropdown-menu dropdown-menu-end p-4 mt-2 shadow frosted-glass" style="min-width: 250px;">
        <div class="text-center mb-3">
          <i class="bi bi-person-circle" style="font-size: 3rem; color: #6c757d;"></i>
          <h5 class="mt-2 mb-0" id="navAdminRole">Loading Role...</h5>
          <small class="text-muted" id="navAdminUser">Loading User...</small>
        </div>
        <hr class="dropdown-divider">
        <div class="mb-3">
          <p class="mb-1 text-muted" style="font-size: 0.9rem;">Employee ID:</p>
          <p class="mb-0 fw-bold" id="navEmployeeID">---</p>
        </div>
        <button onclick="logout()" class="btn btn-outline-danger w-100 mt-2">Log Out</button>
      </div>
    </div>
  </nav>

  <div class="table_container table-responsive">
    <div class="d-flex justify-content-between align-items-center px-0 mb-3">
      <h2 class="mb-0 fs-4">Branches List</h2>
      <div class="d-flex flex-nowrap">
        <a href="./adminOptions.html" class="btn btn-secondary px-3" title="Back to Dashboard">
          <i class="bi bi-box-arrow-left" style="font-size: 1.2rem;"></i> 
          <span class="d-none d-md-inline ms-1">Back</span>
        </a>
      </div>
    </div>
    
    <table class="table table-hover frosted-glass shadow-sm">
      <thead>
        <tr>
          <th scope="col">Branch Id</th>
          <th scope="col">Branch Name</th>
          <th scope="col" class="text-center">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th scope="row" class="align-middle">1</th>
          <td class="align-middle">Computer Science & Engineering (CSE)</td>
          <td class="table_buttons text-center">
            <button class="btn btn-outline-warning fw-bold" onclick="manageBranch('CSE')"><i class="material-icons">edit</i></button>
          </td>
        </tr>
        <tr>
          <th scope="row" class="align-middle">2</th>
          <td class="align-middle">Civil Engineering (CIVIL)</td>
          <td class="table_buttons text-center">
            <button class="btn btn-outline-warning fw-bold" onclick="manageBranch('CIVIL')"><i class="material-icons">edit</i></button>
          </td>
        </tr>
        <tr>
          <th scope="row" class="align-middle">3</th>
          <td class="align-middle">Mechanical Engineering (MECH)</td>
          <td class="table_buttons text-center">
             <button class="btn btn-outline-warning fw-bold" onclick="manageBranch('MECH')"><i class="material-icons">edit</i></button>
          </td>
        </tr>
        <tr>
          <th scope="row" class="align-middle">4</th>
          <td class="align-middle">Electrical Engineering (ELE)</td>
          <td class="table_buttons text-center">
             <button class="btn btn-outline-warning fw-bold" onclick="manageBranch('ELE')"><i class="material-icons">edit</i></button>
          </td>
        </tr>
        <tr>
          <th scope="row" class="align-middle">5</th>
          <td class="align-middle">Electronics & Telecommunication (ETC)</td>
          <td class="table_buttons text-center">
             <button class="btn btn-outline-warning fw-bold" onclick="manageBranch('ETC')"><i class="material-icons">edit</i></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/adminDashboard.js"></script>
  <script src="../../js/bookCRUD.js"></script>  
</body>
</html>
