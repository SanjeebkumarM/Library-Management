<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students List</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/index.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body onload="initializeAndLoadStudents()">
  <nav class="navBar">
    <div class="logo">
      <a href="../homepage.html">
        <img src="../../assets/logo.png" alt="ses">
      </a>
    </div>
    <div class="dropdown">
      <a href="#" role="button" class="rounded-circle" data-bs-toggle="dropdown" aria-expanded="false" data-bs-auto-close="outside">
        <i class="bi bi-person-circle" style="font-size: 2.2rem; color: rgb(255, 255, 255);"></i>
      </a>
      <div class="dropdown-menu dropdown-menu-end p-4 mt-2 shadow frosted-glass" style="min-width: 250px;">
        <div class="text-center mb-3">
          <i class="bi bi-person-circle" style="font-size: 3rem; color: #6c757d;"></i>
          <h5 class="mt-2 mb-0" id="navAdminRole">Loading Role...</h5>
          <small class="text-muted" id="navAdminUser">Loading User...</small>
        </div>
        <hr class="dropdown-divider">
        <div class="mb-3">
          <p class="mb-1 text-muted" style="font-size: 0.9rem;">Employee ID:</p>
          <p class="mb-0 fw-bold" id="navEmployeeID">---</p>
        </div>
        <button onclick="logout()" class="btn btn-outline-danger w-100 mt-2">Log Out</button>
      </div>
    </div>
  </nav>

  <div class="table_container table-responsive">
    
    <div class="d-flex justify-content-between align-items-center px-0 mb-3">
      <h2 class="mb-0 fs-4">Students List</h2>
      <div class="d-flex flex-nowrap">
        <button type="button" class="btn btn-warning fw-bold px-3" title="Add Student" onclick="openAddStudentModal()">
          <i class="bi bi-person-plus-fill" style="font-size: 1.2rem;"></i> 
          <span class="d-none d-md-inline ml-1">Add Student</span>
        </button>
        <a href="./adminOptions.html" class="btn btn-secondary mx-2 px-3" title="Back to Admin Options">
          <i class="bi bi-box-arrow-left" style="font-size: 1.2rem;"></i> 
          <span class="d-none d-md-inline ml-1">Back</span>
        </a>
      </div>
    </div>

    <table class="table table-hover frosted-glass shadow-sm">
      <thead>
        <tr>
          <th scope="col">SLNo</th>
          <th scope="col">Branch</th>
          <th scope="col">Name</th>
          <th scope="col">Roll No</th>
          <th scope="col" class="text-center">Borrowing History</th>
          <th scope="col" class="text-center">Edit</th>
        </tr>
      </thead>
      <tbody>
        </tbody>
    </table>
  </div>

  <div class="modal fade" id="addStudentModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content frosted-glass">
        <div class="modal-header border-bottom-0">
          <h5 class="modal-title fw-bold text-dark" id="modalTitle">Add New Student</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="cancelAddStudent()"></button>
        </div>
        <div class="modal-body">
          <form id="addStudentForm" onsubmit="addNewStudent(event)">
            <div class="form-group mb-3">
              <label class="fw-bold text-dark">Full Name</label>
              <input type="text" class="form-control" id="addStudentName" placeholder="Enter student's full name" required>
            </div>
            
            <div class="form-group mb-3">
              <label class="fw-bold text-dark">Roll Number (e.g., CSE-25001)</label>
              <input type="text" class="form-control" id="addStudentRoll" placeholder="Enter roll number" required>
            </div>

            <div class="form-group mb-4">
              <label class="fw-bold text-dark">Temporary Password</label>
              <input type="password" class="form-control" id="addStudentPassword" placeholder="Assign a default password" required>
            </div>
            
            <div class="d-flex justify-content-end border-top-0">
              <button type="button" class="btn btn-secondary px-4 me-2" data-bs-dismiss="modal" onclick="cancelAddStudent()">Cancel</button>
              <button type="submit" class="btn btn-success px-5">Add Student</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/adminDashboard.js"></script>  
  <script src="../../js/studentCRUD.js"></script>
</body>
</html>
