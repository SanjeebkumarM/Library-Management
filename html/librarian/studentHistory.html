<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borrowing History</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/index.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body onload="loadHistory()">
  <nav class="navBar">
    <div class="logo">
      <a href="../homepage.html"><img src="../../assets/logo.png" alt="ses"></a>
    </div>
    <div class="dropdown">
      <a href="#" role="button" class="rounded-circle" data-bs-toggle="dropdown" aria-expanded="false" data-bs-auto-close="outside">
        <i class="bi bi-person-circle" style="font-size: 2.2rem; color: rgb(255, 255, 255);"></i>
      </a>
      <div class="dropdown-menu dropdown-menu-end p-4 mt-2 frosted-glass" style="min-width: 250px;">
        <div class="text-center mb-3">
          <i class="bi bi-person-circle" style="font-size: 3rem; color: #6c757d;"></i>
          <h5 class="mt-2 mb-0" id="navAdminRole">Loading Role...</h5>
          <small class="text-muted" id="navAdminUser">Loading User...</small>
        </div>
        <hr class="dropdown-divider">
        <div class="mb-3">
          <p class="mb-1 text-muted" style="font-size: 0.9rem;">Employee ID:</p>
          <p class="mb-0 fw-bold" id="navEmployeeID">---</p>
        </div>
        <button onclick="logout()" class="btn btn-outline-danger w-100 mt-2">Log Out</button>
      </div>
    </div>
  </nav>

  <div class="table_container">
    <div class="d-flex justify-content-between align-items-center px-0 mb-3">
      <h2 id="historyTitle" class="mb-0 fs-4 text-truncate pe-2">Borrowing History</h2>
      
      <div class="d-flex flex-nowrap">
        <a href="./libStudentList.html" class="btn btn-secondary px-3" title="Back to Students List">
          <i class="bi bi-box-arrow-left" style="font-size: 1.2rem;"></i> 
          <span class="d-none d-md-inline ms-1">Back</span>
        </a>
      </div>
    </div>
    <div class="table-responsive pb-3">
    <table class="table table-hover frosted-glass shadow-sm">
      <thead>
        <tr>
          <th scope="col">Book ID</th>
          <th scope="col">Title</th>
          <th scope="col">Issued Date</th>
          <th scope="col">Due Date</th>
          <th scope="col">Returned Date</th>
          <th scope="col" class="text-center">Action</th>
        </tr>
      </thead>
      <tbody id="historyTableBody">
        </tbody>
    </table>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/adminDashboard.js"></script>
  <script src="../../js/studentHistory.js"></script>
</body>
</html>
