<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Student</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/index.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body onload="loadStudentData()">
  <nav class="navBar">
    <div class="logo">
      <a href="../homepage.html"><img src="../../assets/logo.png" alt="ses"></a>
    </div>
    <div class="nav-right">
        <h3>Sundargarh Engineering School</h3>
        <p>Aproved by AICTE & Affiliated to SCTE & VT, Govt of India</p>
      </div>
      <div class="dropdown">
      <a href="#" role="button" class="rounded-circle" data-bs-toggle="dropdown" aria-expanded="false" data-bs-auto-close="outside">
        <i class="bi bi-person-circle" style="font-size: 2.2rem; color: rgb(255, 255, 255);"></i>
         </a>
          <div class="dropdown-menu dropdown-menu-end p-4 mt-2 shadow frosted-glass" style="min-width: 250px;">
            <div class="text-center mb-3">
              <i class="bi bi-person-circle" style="font-size: 3rem; color: #6c757d;"></i>
              <h5 class="mt-2 mb-0" id="navAdminRole">Loading Role...</h5>
              <small class="text-muted" id="navAdminUser">Loading User...</small>
            </div>
              <hr class="dropdown-divider">
              <div class="mb-3">
                <p class="mb-1 text-muted" style="font-size: 0.9rem;">Employee ID:</p>
                <p class="mb-0 fw-bold" id="navEmployeeID">---</p>
              </div>
              <button onclick="logout()" class="btn btn-outline-danger w-100 mt-2">Log Out</button>
          </div>
      </div>
  </nav>

  <div class="editBranchForm">
    <h2>Edit Student Information</h2>
    <form class=" frosted-glass">
      <div class="form-group">
        <label>Student Name</label>
        <input type="text" class="form-control" id="editStudentName" placeholder="Name...">
      </div>
      <div class="form-group">
        <label>Roll No</label>
        <input type="text" class="form-control" id="editStudentRoll" readonly>
        <small class="form-text text-muted">Roll numbers cannot be changed.</small>
      </div>
    </form>
    <div class="submit_bttns">
      <a href="./libStudentList.html">
        <button class="btn btn-danger px-5 mx-3">Cancel</button>
      </a>
      <button class="btn btn-success px-4" onclick="saveStudentChanges()">Update Student</button>
    </div>
  </div>

  <script>
    // 1. Load the data when the page opens
    function loadStudentData() {
      const studentToEdit = JSON.parse(localStorage.getItem("studentToEdit"));
      if (studentToEdit) {
        document.getElementById("editStudentName").value = studentToEdit.name;
        document.getElementById("editStudentRoll").value = studentToEdit.rollNo;
      }
    }

    // 2. Save the changes back to the main array
    function saveStudentChanges() {
      const targetRoll = document.getElementById("editStudentRoll").value;
      const newName = document.getElementById("editStudentName").value;
      
      let jsonObj = JSON.parse(localStorage.getItem("myStudents"));
      
      // Find and update
      for (let i = 0; i < jsonObj.students.length; i++) {
        if (jsonObj.students[i].rollNo === targetRoll) {
          jsonObj.students[i].name = newName;
          break;
        }
      }
      
      localStorage.setItem("myStudents", JSON.stringify(jsonObj));
      window.location.href = "./libStudentList.html"; // Go back to list
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/adminDashboard.js"></script>
</body>
</html>
