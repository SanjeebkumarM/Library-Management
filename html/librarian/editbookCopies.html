<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Branch Books</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="../../css/index.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>

<body onload="loadBranchBooks()">
  <nav class="navBar">
    <div class="logo">
      <a href="../homepage.html"><img src="../../assets/logo.png" alt="ses"></a>
    </div>
      <div class="dropdown">
      <a href="#" role="button" class="rounded-circle" data-bs-toggle="dropdown" aria-expanded="false" data-bs-auto-close="outside">
        <i class="bi bi-person-circle" style="font-size: 2.2rem; color: rgb(255, 255, 255);"></i>
         </a>
          <div class="dropdown-menu dropdown-menu-end p-4 mt-2 shadow frosted-glass" style="min-width: 250px;">
            <div class="text-center mb-3">
              <i class="bi bi-person-circle" style="font-size: 3rem; color: #6c757d;"></i>
              <h5 class="mt-2 mb-0" id="navAdminRole">Loading Role...</h5>
              <small class="text-muted" id="navAdminUser">Loading User...</small>
            </div>
              <hr class="dropdown-divider">
              <div class="mb-3">
                <p class="mb-1 text-muted" style="font-size: 0.9rem;">Employee ID:</p>
                <p class="mb-0 fw-bold" id="navEmployeeID">---</p>
              </div>
              <button onclick="logout()" class="btn btn-outline-danger w-100 mt-2">Log Out</button>
          </div>
      </div>
  </nav>

  <div class="table_container table-responsive">
    <div class="d-flex justify-content-between align-items-center px-0 mb-3">
      <h2 id="branchTitle" class="mb-0 fs-4 text-truncate">Manage Books: Loading...</h2>
      
      <div class="d-flex flex-nowrap">
        <button class="btn btn-success fw-bold mx-2 px-3" title="Add New Book" onclick="openAddModal()">
          <i class="bi bi-plus-circle" style="font-size: 1.2rem;"></i> 
          <span class="d-none d-md-inline ml-1">Add Book</span>
        </button>
        
        <a href="./libBranchesList.html" class="btn btn-secondary px-3" title="Back to Branches">
          <i class="bi bi-box-arrow-left" style="font-size: 1.2rem;"></i> 
          <span class="d-none d-md-inline ml-1">Back</span>
        </a>
      </div>
    </div>
    <table class="table table-hover frosted-glass shadow-sm">
      <thead>
        <tr>
          <th scope="col">Book ID</th>
          <th scope="col">Title</th>
          <th scope="col">Author</th>
          <th scope="col">Publisher</th>
          <th scope="col">Total Copies</th>
          <th scope="col">Available Stock</th>
          <th scope="col" class="text-center">Edit</th>
          <th scope="col" class="text-center">Delete</th>
        </tr>
      </thead>
      <tbody id="booksTableBody">
        </tbody>
    </table>
  </div>
  <div class="modal fade" id="bookModal" tabindex="-1" role="dialog" aria-labelledby="formTitle" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
      <div class="modal-content frosted-glass">
        <div class="modal-header">
          <h5 class="modal-title fw-bold text-dark" id="formTitle">Add New Book</h5>
          <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close" onclick="cancelEdit()">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <form id="bookForm" onsubmit="saveBook(event)">
            <input type="hidden" id="isEditing" value="false">
            
            <div class="row">
              <div class="col-md-4 form-group">
                <label class="fw-bold">Book ID (Unique)</label>
                <input type="text" class="form-control" id="bookId" placeholder="e.g. CSE-101" required>
              </div>
              <div class="col-md-8 form-group">
                <label class="fw-bold">Book Title</label>
                <input type="text" class="form-control" id="bookTitle" placeholder="Title..." required>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 form-group">
                <label class="fw-bold">Author</label>
                <input type="text" class="form-control" id="bookAuthor" placeholder="Author Name..." required>
              </div>
              <div class="col-md-6 form-group">
                <label class="fw-bold">Publisher</label>
                <input type="text" class="form-control" id="bookPublisher" placeholder="Publisher / Edition..." required>
              </div>
            </div>

            <div class="row">
              <div class="col-md-4 form-group">
                <label class="fw-bold">Total Copies</label>
                <input type="number" class="form-control" id="bookCopies" min="1" value="1" required>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal" onclick="cancelEdit()">Cancel</button>
          <button type="submit" form="bookForm" id="formSubmitBtn" class="btn btn-success px-5">Add Book</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/bookCRUD.js"></script>
  <script src="../../js/adminDashboard.js"></script>
</body>
</html>
