<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/index.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <nav class="navBar">
    <div class="logo">
      <a href="../homepage.html">
        <img src="../../assets/logo.png" alt="ses">
      </a>
    </div>
  </nav>
  <div class="authContainer">
    <div class="login-card">
      <div class="login_main">
        <div class="login_form">
          <div class="icon-circle bg-admin">
            <i class="bi bi-shield-lock-fill"></i>
          </div>
        <h1>Librarian Login</h1>
        <form action="libBranchesList.html" onsubmit="return validateAdmin(event)">
          <label>Username:</label>
          <input id="adminUsername" type="text" placeholder="Enter your username..." required>
          <label>Password:</label>
          <input id="adminPassword" type="password" placeholder="Enter your password..." required>
          <button id="submit_btn" type="submit" >Login</button>
          
      </form>
    </div>
  </div>
  <script src="../../js/validateAdmin.js"></script>
</body>
</html>
