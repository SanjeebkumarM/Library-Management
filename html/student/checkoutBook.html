<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Book</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/index.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body onload="loadCheckoutBooks()">
  <nav class="navBar">
    <div class="logo">
      <a href="../homepage.html"><img src="../../assets/logo.png" alt="ses"></a>
    </div>
    <div class="dropdown">
      <a href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false" data-bs-auto-close="outside">
        <i class="bi bi-person-circle" style="font-size: 2.2rem; color: rgb(255, 255, 255);"></i>
      </a>
      <div class="dropdown-menu dropdown-menu-end p-4 mt-2 shadow frosted-glass" style="min-width: 250px;">
        <div class="text-center mb-3">
          <i class="bi bi-person-circle" style="font-size: 3rem; color: #6c757d;"></i>
          <h5 class="mt-2 mb-0" id="navStudentName">Loading Name...</h5>
          <small class="text-muted" id="navStudentRoll">Loading Roll...</small>
        </div>
        <hr class="dropdown-divider">
        <div class="mb-3">
          <p class="mb-1 text-muted" style="font-size: 0.9rem;">Library Card ID:</p>
          <p class="mb-0 fw-bold" id="navStudentCard">---</p>
        </div>
        <button onclick="logout()" class="btn btn-outline-danger w-100 mt-2">Log Out</button>
      </div>
    </div>
  </nav>

  <div class="table_container table-responsive">
    <h2 id="catalogTitle" class="fs-4 mb-3">Books Catalog</h2>
    
    <table class="table table-hover frosted-glass shadow-sm">
      <thead>
        <tr>
          <th scope="col" class="text-center">Select</th>
          <th scope="col">Book Title</th>
          <th scope="col">Author</th>
          <th scope="col">Publisher</th>
        </tr>
      </thead>
      <tbody id="checkoutTableBody">
        </tbody>
    </table>
  
    <div class="submit_bttns text-center mt-4">
      <a href="./selectBranch.html">
        <button class="btn btn-danger mx-3 px-3">Back</button>
      </a>
      <button class="btn btn-success px-3" onclick="checkoutSelectedBooks(event)">Checkout Selected</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/studentDashboard.js"></script>
  <script src="../../js/checkout.js"></script>
</body>
</html>
