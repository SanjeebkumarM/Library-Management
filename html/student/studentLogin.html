<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>LIBRARY MANAGEMENT SYSTEM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/index.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>
  <nav class="navBar">
    <div class="logo">
      <a href="../homepage.html">
        <img src="../../assets/logo.png" alt="ses">
      </a>
    </div>
  </nav>

  <div class="authContainer">
    <div class="login-card">
      <div class="login_main">
        <div class="login_form">
          <div class="icon-circle bg-student">
            <i class="bi bi-mortarboard-fill"></i>
          </div>
        <h1>Student Login</h1>
        <form action="studentOptions.html" onsubmit="return validateStudent(event)">
          <label>Roll No:</label>
          <input class="input1" id="studentUsername" type="text" placeholder="Enter your roll number (eg, CSE-24028)" required>
          <label>Password:</label>
          <input class="input2" id="studentPassword" type="password" placeholder="Enter your password" required>
          <button id="submit_btn" type="submit" >Login</button>
      </form>
    </div>
  </div>
</div>
</div>
<script src="../../js/validateStudents.js"></script>
</body>
</html>
