<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Branch</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/index.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>
  <nav class="navBar">
    <div class="logo">
      <a href="../homepage.html"><img src="../../assets/logo.png" alt="ses"></a>
    </div>
    <div class="nav-right">
        <h3>Sundargarh Engineering School</h3>
        <p>Approved by AICTE & Affiliated to SCTE & VT, Govt of India</p>
    </div>
    <div class="dropdown">
      <a href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false" data-bs-auto-close="outside">
        <i class="bi bi-person-circle" style="font-size: 2.2rem; color: rgb(255, 255, 255);"></i>
      </a>
      <div class="dropdown-menu dropdown-menu-end p-4 mt-2 shadow frosted-glass" style="min-width: 250px;">
        <div class="text-center mb-3">
          <i class="bi bi-person-circle" style="font-size: 3rem; color: #6c757d;"></i>
          <h5 class="mt-2 mb-0" id="navStudentName">Loading Name...</h5>
          <small class="text-muted" id="navStudentRoll">Loading Roll...</small>
        </div>
        <hr class="dropdown-divider">
        <div class="mb-3">
          <p class="mb-1 text-muted" style="font-size: 0.9rem;">Library Card ID:</p>
          <p class="mb-0 fw-bold" id="navStudentCard">---</p>
        </div>
        <button onclick="logout()" class="btn btn-outline-danger w-100 mt-2">Log Out</button>
      </div>
    </div>
  </nav>

  <div class="selectBranch_main">
    <select id="branchSelect" class="form-control form-control-lg frosted-glass">
      <option selected>Select a branch...</option>
      <option value="CSE">CSE</option>
      <option value="CIVIL">CIVIL</option>
      <option value="MECH">MECH</option>
      <option value="ELE">ELE</option>
      <option value="ETC">ETC</option>
    </select>
  </div>

  <div class="submit_bttns text-center mt-5">
    <a href="./studentOptions.html">
      <button class="btn btn-danger px-5 mx-3">Cancel</button>
    </a>
    <button class="btn btn-success px-5" onclick="goToCheckout(event)">Next</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/studentDashboard.js"></script>
  <script src="../../js/checkout.js"></script>
</body>
</html>
